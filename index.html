<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flamingueo - Dashboard Valoraciones</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <link rel="stylesheet" href="styles.css?v=3">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- Loading -->
  <div class="loading-overlay" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Cargando datos...</div>
  </div>

  <!-- Error banner -->
  <div class="error-banner" id="errorBanner"></div>

  <div class="dashboard">

    <!-- HEADER -->
    <header class="header">
      <div class="header-left">
        <div class="logo-icon">F</div>
        <div class="header-title">
          <h1>FLAMINGUEO</h1>
          <div class="subtitle">Google Business Profile - Valoraciones</div>
        </div>
      </div>
      <div class="header-right">
        <div class="status-badge">
          <span class="status-dot"></span>
          <span id="lastUpdate">Actualizando...</span>
        </div>
        <div>
          <div class="clock" id="clock">--:--</div>
          <div class="clock-date" id="clockDate">--</div>
        </div>
      </div>
    </header>

    <!-- CONTENIDO -->
    <main class="content">

      <!-- COLUMNA IZQUIERDA -->
      <div class="left-column">

        <!-- Score principal -->
        <div class="card score-card">
          <div class="score-value" id="scoreValue">--</div>
          <div class="score-stars" id="scoreStars">-----</div>
          <div class="score-label">Puntuacion Media</div>
          <div class="score-total" id="scoreTotal">-- valoraciones en total</div>
        </div>

        <!-- Mini KPIs -->
        <div class="kpi-grid">
          <div class="kpi-card">
            <div class="kpi-value green" id="kpiTotal">--</div>
            <div class="kpi-label">Total resenas</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value pink" id="kpiMonth">--</div>
            <div class="kpi-label">Este mes</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value gold" id="kpiAvg5">--</div>
            <div class="kpi-label">% 5 estrellas</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value blue" id="kpiResponseRate">--</div>
            <div class="kpi-label">% respondidas</div>
          </div>
        </div>

        <!-- Distribucion de estrellas -->
        <div class="card stars-distribution">
          <div class="card-header">
            <span class="card-title">Distribucion</span>
          </div>
          <div id="starsContainer"></div>
        </div>

      </div>

      <!-- COLUMNA CENTRAL -->
      <div class="center-column">

        <!-- Grafico de evolucion -->
        <div class="card chart-card">
          <div class="card-header">
            <span class="card-title">Evolucion</span>
            <div class="chart-tabs">
              <button class="chart-tab active" data-range="30">30d</button>
              <button class="chart-tab" data-range="60">60d</button>
              <button class="chart-tab" data-range="90">90d</button>
            </div>
          </div>
          <div class="chart-container">
            <canvas id="evolutionChart"></canvas>
          </div>
        </div>

        <!-- Grafico de resenas mensuales -->
        <div class="card chart-card monthly-chart">
          <div class="card-header">
            <span class="card-title">Resenas por mes</span>
          </div>
          <div class="chart-container">
            <canvas id="monthlyChart"></canvas>
          </div>
        </div>

      </div>

      <!-- COLUMNA DERECHA -->
      <div class="right-column">

        <!-- Ultimas resenas -->
        <div class="card reviews-card">
          <div class="card-header">
            <span class="card-title">Ultimas Resenas</span>
            <span class="card-badge" id="reviewsBadge">--</span>
          </div>
          <div class="reviews-list" id="reviewsList"></div>
        </div>

      </div>

    </main>
  </div>

  <script src="app.js?v=3"></script>
</body>
</html>
